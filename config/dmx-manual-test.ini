# Manual DMX hardware test — Phase 2 exit criteria
# RGBW par fixture at DMX address 1 (6CH mode, CH1=240 for independent RGBW control)
# CH1 = mode/dimmer   address 1
# CH2 = red           address 2
# CH3 = green         address 3
# CH4 = blue          address 4
# CH5 = white         address 5
# CH6 = programs      address 6  (kept at 0)
#
# PxB models this fixture as two logical lights:
#   dimmer-ctrl  — address 1 (dimmer, sets CH1=240 for independent mode)
#   stage-rgb    — address 2 (rgb,    drives CH2/CH3/CH4)

[mqtt]
broker     = localhost
port       = 1883
client_id  = pxb-dmx-test
base_topic = paradox/dmx-test

[dmx]
interface  = opendmx
port       = /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_B002JE1K-if00-port0
refresh_hz = 30

# CH1: fixture mode channel — set to 240 to enable independent RGBW control
[light:mode-ctrl]
backend    = dmx
topic      = paradox/dmx-test/lights/mode-ctrl
fixture    = dimmer
address    = 1
brightness = 94

# CH2-CH4: RGB control
[light:stage-rgb]
backend    = dmx
topic      = paradox/dmx-test/lights/stage-rgb
fixture    = rgb
address    = 2
brightness = 100
