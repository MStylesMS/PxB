; PxB full-stack test configuration
;
; Purpose:
;   Documents the adapter setup that test/soak/fault-isolation.soak.test.js simulates.
;   NOT used directly by Jest (the soak test wires adapters programmatically);
;   serves as a human-readable reference and can be pointed at real hardware once
;   the host addresses are filled in.
;
; All host/IP values use RFC-5737 documentation addresses (192.0.2.x) as placeholders.
; Replace with real values before running against hardware.
;
; Usage (with real hardware):
;   node src/index.js --config config/test-full-stack.ini --log-level debug

; ── MQTT ─────────────────────────────────────────────────────────────────────

[mqtt]
broker       = localhost
port         = 1883
client_id    = pzb-soak-test
base_topic   = paradox/test

; ── Global ───────────────────────────────────────────────────────────────────

[global]
log_level          = warn
heartbeat_interval = 5

; ── Radios (disabled — not needed for adapter soak) ──────────────────────────

[zwave]
enabled = false
port    = /dev/ttyUSB0

[zigbee]
enabled = false
port    = /dev/ttyUSB1

; ── Light adapters ────────────────────────────────────────────────────────────
; One of each supported backend.

; Philips Hue — group 1 on the bridge at 192.0.2.100
[light:hue-mirror]
backend         = hue
topic           = paradox/test/lights/hue-mirror
host            = 192.0.2.100
api_key         = 00000000000000000000000000000000hue
hue_target_type = group
hue_target_id   = 1
volume          = 80

; WiZ bulb at 192.0.2.101
[light:wiz-stage]
backend    = wiz
topic      = paradox/test/lights/wiz-stage
host       = 192.0.2.101
brightness = 90

; LIFX cloud — selector targets all lights on the token account
[light:lifx-lobby]
backend  = lifx
topic    = paradox/test/lights/lifx-lobby
api_key  = 00000000000000000000000000000000lifx

; ── Light zone (fan-out over hue + wiz) ──────────────────────────────────────

[light-zone:main-zone]
topic   = paradox/test/lights/main-zone
devices = hue-mirror, wiz-stage

; ── Switch adapters ───────────────────────────────────────────────────────────
; Shelly relay (Gen 2) at 192.0.2.200

[switch:shelly-fogger]
backend   = shelly
topic     = paradox/test/relay/shelly-fogger
host      = 192.0.2.200
port      = 80
timeout_s = 10
